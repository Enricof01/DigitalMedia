services:
  postgres:
    image: postgres:16-alpine
    container_name: scrollfrei_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: scrollfrei_user
      POSTGRES_PASSWORD: scrollfrei_pass
      POSTGRES_DB: scrollfrei_db
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
